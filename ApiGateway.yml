server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    loadbalancer:
      rule: random

    gateway:
      routes:
        - id: zone-management-service
          uri: http://localhost:8081/
          predicates:
            - Path=/api/zones/**

        - id: sensor-telemetry-service
          uri: http://localhost:8082/
          predicates:
            - Path=/api/sensors/**

        - id: automation-service
          uri: http://localhost:8083/
          predicates:
            - Path=/api/automation/**

        - id: crop-inventory-service
          uri: http://localhost:8084/
          predicates:
            - Path=/api/crops/**

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

jwt:
  secret: "2D4A614E645267556B58703273357638792F423F4428472B4B6250655368566D"
